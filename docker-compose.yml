# OmniAgent Remote Server docker-compose 模板（L2 §11.3 — M2 iter 4）
#
# 一键部署 OmniAgent Remote Server（SSH-可达的远端 OmniAgent 实例）。
#
# 用法：
#   1. 复制 .env.example 为 .env，填入 API key 等敏感信息
#   2. docker compose up -d
#   3. 客户端通过 SSH 调用：agent_router(route=remote, remote_target="omniagent@server:2222")
#
# 暴露端口：
#   - 2222: SSH（RemoteAgentClient 通过此端口委托任务）
#
# 卷挂载：
#   - omniagent-data: ~/.omniagent（transcripts + memory + mailbox）
#   - omniagent-worktrees: /tmp/worktrees（git worktree 共享空间）
#
# 资源限制：
#   - mem_limit: 2g（避免单 agent OOM 影响主机）
#   - cpus: 2.0（避免单 agent CPU 占满）
#   - pids_limit: 256（避免子进程爆炸）

services:
  omniagent-remote:
    image: omniagent-cli:latest
    # 若本地无 image，则自动 build（M2 iter 4 默认 build）
    build:
      context: .
      dockerfile: Dockerfile
      platforms:
        - linux/amd64
        - linux/arm64
    container_name: omniagent-remote
    restart: unless-stopped

    # SSH 服务（OpenSSH server，alpine 默认未装，需在 image 中安装）
    # M2 iter 4 stub：用 entrypoint 脚本启动 sshd
    # 实际生产：使用专门 sshd 镜像或 entrypoint 安装 openssh
    ports:
      - "2222:2222"

    volumes:
      # ~/.omniagent 持久化（transcripts/memory/mailbox）
      - omniagent-data:/home/omniagent/.omniagent
      # worktree 共享空间（用于 SwarmTeam 多 teammate 共享代码仓库）
      - omniagent-worktrees:/tmp/worktrees
      # SSH host keys（重启不丢失）
      - omniagent-ssh:/etc/ssh

    environment:
      # 从 .env 读敏感配置
      - OMNIAGENT_LLM_PROVIDER=${OMNIAGENT_LLM_PROVIDER:-openai}
      - OMNIAGENT_LLM_API_KEY=${OMNIAGENT_LLM_API_KEY:?OMNIAGENT_LLM_API_KEY required}
      - OMNIAGENT_LLM_MODEL=${OMNIAGENT_LLM_MODEL:-}
      - OMNIAGENT_LLM_FALLBACK=${OMNIAGENT_LLM_FALLBACK:-}
      - OMNIAGENT_LLM_BASE_URL=${OMNIAGENT_LLM_BASE_URL:-}
      - NODE_ENV=production
      - OMNIAGENT_MAX_CONCURRENT_AGENTS=${OMNIAGENT_MAX_CONCURRENT_AGENTS:-16}
      - OMNIAGENT_WORKFLOW_ORCHESTRATOR=${OMNIAGENT_WORKFLOW_ORCHESTRATOR:-0}

    # 资源限制（容器级 cgroup）
    # 注意：pids 必须放在 deploy.resources.limits 下，
    #       不能与 service-level pids_limit 共存（Compose v2 视为同一 cgroup key 冲突）
    deploy:
      resources:
        limits:
          memory: 2g
          cpus: '2.0'
          pids: 256
        reservations:
          memory: 512m
          cpus: '0.5'

    # 健康检查：进程不响应即 unhealthy
    healthcheck:
      test: ["CMD", "node", "-e", "process.exit(0)"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

    # 日志驱动：json-file + 滚动
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "5"

    # security_opt：no-new-privileges 防止提权
    security_opt:
      - no-new-privileges:true

    # read_only filesystem + tmpfs for writable paths
    # M2 iter 4 stub：read-only 可能影响 ~/.omniagent 写入（volume 已挂载，应可写）
    # 暂不启用，等 M3 sandbox 集成后启用
    # read_only: true

  # ============================================================
  # 可选：mailhog（本地 SMTP 测试，用于邮件通知）
  # ============================================================
  # mailhog:
  #   image: mailhog/mailhog:latest
  #   ports:
  #     - "8025:8025"  # Web UI
  #     - "1025:1025"  # SMTP

volumes:
  omniagent-data:
    driver: local
  omniagent-worktrees:
    driver: local
  omniagent-ssh:
    driver: local
